name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Python syntax + lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile check
        run: |
          python -m py_compile connector.py
          python -m py_compile pty-manager.py
      - name: Install ruff
        run: pip install --quiet ruff
      - name: Ruff lint
        run: ruff check --select=E,F,W,B --ignore=E501,E402 connector.py pty-manager.py

  lint-shell:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
      - name: Syntax check aiterm CLI
        run: bash -n aiterm

  verify-license:
    name: License + README present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required files
        run: |
          test -f LICENSE || (echo "LICENSE missing" && exit 1)
          test -f README.md || (echo "README.md missing" && exit 1)
          test -f SECURITY.md || (echo "SECURITY.md missing" && exit 1)
          grep -q "MIT License" LICENSE

  sast-bandit:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install --quiet bandit
      - name: Run bandit
        # B101: assert_used — fine in non-test code
        # B310: urllib urlopen — controlled URLs (update server), no user input
        # B404,B603,B607: subprocess usage — intentional for systemd/kill
        run: bandit -r connector.py pty-manager.py -ll --skip B101,B310,B404,B603,B607

  deps-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: pip install --quiet pip-audit
      - name: Audit declared runtime deps
        run: |
          cat > requirements-audit.txt <<EOF
          websockets>=11
          cryptography>=41
          EOF
          pip-audit --requirement requirements-audit.txt --strict --desc

  secret-scan:
    name: Secret scanning (gitleaks CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source=. --config=.gitleaks.toml --verbose --redact --no-banner --exit-code=1

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:python
