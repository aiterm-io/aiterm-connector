title = "AITerm gitleaks config"

[extend]
useDefault = true

# MANIFEST_PUBKEY_HEX is an Ed25519 *public* key — embedded on purpose
# (installer and connector verify signed-update manifest against it).
# gitleaks flags the high-entropy hex; suppress on the line it appears.
[allowlist]
description = "Ed25519 public key — published by design"
regexTarget = "line"
regexes = [
    '''MANIFEST_PUBKEY_HEX''',
    '''MANIFEST_PUBKEY_HEX_PEM''',
]
